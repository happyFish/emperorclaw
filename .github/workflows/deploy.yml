name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync source to VPS release folder
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
          RELEASE="/var/www/emperorclaw-releases/github-${GITHUB_SHA}-${GITHUB_RUN_ID}"
          echo "RELEASE=$RELEASE" >> "$GITHUB_ENV"
          ssh root@$VPS_HOST "mkdir -p '$RELEASE'"
          rsync -az --delete --exclude='.env' --exclude='.git' --exclude='node_modules' --exclude='.next' ./ root@$VPS_HOST:"$RELEASE"/

      - name: Build, promote, and health-check on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP=/var/www/emperorclaw
            RELEASE="${{ env.RELEASE }}"
            BACKUP="/var/www/emperorclaw-backup-$(date +%Y%m%d%H%M%S)"
            ENV_SNAPSHOT="/tmp/emperorclaw-env-${{ github.run_id }}"

            test -d "$APP"
            test -f "$APP/.env"
            test -d "$RELEASE"

            cp "$APP/.env" "$RELEASE/.env"

            cd "$RELEASE"
            npm ci --no-audit --no-fund
            npm run db:migrate
            npm run build

            test -f "$RELEASE/package.json"
            test -f "$RELEASE/.next/BUILD_ID"

            cp -a "$APP" "$BACKUP"
            cp "$APP/.env" "$ENV_SNAPSHOT"

            rollback() {
              echo "Deploy failed after promotion. Rolling back to $BACKUP"
              rsync -a --delete --exclude='.env' "$BACKUP"/ "$APP"/
              cp "$ENV_SNAPSHOT" "$APP/.env"
              chmod 600 "$APP/.env"
              cd "$APP"
              pm2 restart emperorclaw --update-env || pm2 start ecosystem.config.js --update-env
            }
            trap rollback ERR

            rsync -a --delete --exclude='.env' "$RELEASE"/ "$APP"/
            cp "$ENV_SNAPSHOT" "$APP/.env"
            chmod 600 "$APP/.env"

            cd /var/www/emperorclaw
            test -f package.json
            test -f .next/BUILD_ID
            pm2 restart emperorclaw --update-env || pm2 start ecosystem.config.js --update-env
            sleep 5
            curl -fsS -I http://127.0.0.1:3000/ >/tmp/emperorclaw-health-${{ github.run_id }}.txt
            trap - ERR
            pm2 status emperorclaw --no-color
            cat /tmp/emperorclaw-health-${{ github.run_id }}.txt
            echo "Deployed and health check passed."
