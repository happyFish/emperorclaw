name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync source to VPS temporary folder
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude='.env' --exclude='.git' --exclude='node_modules' --exclude='.next' ./ root@$VPS_HOST:/var/www/emperorclaw_temp

      - name: Build, swap, and reload on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            # 1. Build the app in the temporary directory
            cd /var/www/emperorclaw_temp
            # Copy the .env file from the live site so the build has correct environment variables (if needed)
            cp /var/www/emperorclaw/.env ./.env || true
            npm install --production=false
            npm run db:migrate
            npm run build
            
            # 2. Swap the temporary directory with the live directory instantly
            rm -rf /var/www/emperorclaw_old
            mv /var/www/emperorclaw /var/www/emperorclaw_old
            mv /var/www/emperorclaw_temp /var/www/emperorclaw
            
            # 3. Reload PM2 gracefully using ecosystem.config.js
            cd /var/www/emperorclaw
            pm2 start ecosystem.config.js --update-env || pm2 reload ecosystem.config.js --update-env
            echo "✅ Deployed and reloaded with zero downtime!"
